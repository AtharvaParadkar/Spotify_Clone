name: frontend
description: Spotify Clone

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  fpdart: ^1.1.1
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  shared_preferences: ^2.5.5
  dotted_border: ^2.1.0
  flex_color_picker: ^3.5.0
  file_picker: ^8.0.3
  audio_waveforms: ^1.0.5
  hive: ^4.0.0-dev.2
  isar_flutter_libs: ^4.0.0-dev.13
  path_provider: ^2.1.0
  just_audio: ^0.10.5
  just_audio_background: ^0.0.1-beta.17

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/